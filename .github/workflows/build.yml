name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # در اینجا به جای ./gradlew از دستور gradle استفاده می‌کنیم
    # که نیازی به فایل gradlew در ریشه پروژه ندارد
    - name: Build with Gradle
      run: gradle assembleDebug
