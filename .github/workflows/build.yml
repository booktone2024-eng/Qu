name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      # استفاده از دستور 'gradle' به جای './gradlew'
      # این دستور نیازی به فایل gradlew در پوشه پروژه ندارد
      run: gradle assembleDebug -x validateSigning -x processDebugGoogleServices
